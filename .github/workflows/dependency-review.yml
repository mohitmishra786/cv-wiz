# Dependency Review Action
#
# Scans PR dependency manifest changes for known vulnerabilities and submits
# an SBOM snapshot for the PR head so Code Scanning does not warn:
#   "No snapshots were found for the head SHA".
#
# Source: https://github.com/actions/dependency-review-action
# Docs: https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review

name: 'Dependency review'
on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  # Submit a dependency snapshot for the PR head SHA (silences snapshot warnings).
  submit-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Submit frontend lockfile SBOM snapshot
        uses: anchore/sbom-action@v0
        with:
          file: frontend/package-lock.json
          format: spdx-json
          dependency-snapshot: true
          upload-artifact: false
          # Associate snapshot with the PR head commit
          # (anchore uses github.sha by default for PR merge refs; force head)
        continue-on-error: true

      - name: Submit backend requirements SBOM snapshot
        uses: anchore/sbom-action@v0
        with:
          file: backend/requirements.txt
          format: spdx-json
          dependency-snapshot: true
          upload-artifact: false
        continue-on-error: true

  dependency-review:
    needs: submit-snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: always
          # Snapshots were submitted above; brief retry covers API lag.
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 90
