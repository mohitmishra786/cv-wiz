# Dependency Review Action
#
# Scans PR dependency manifest changes (package-lock.json, requirements, etc.)
# for known vulnerabilities via lockfile/manifest diffs.
#
# Note: "No snapshots were found for the head SHA" is an informational warning
# when a PR does not change dependency manifests (Scanned Files: None). It is
# not a vulnerability finding. We intentionally do not enable
# retry-on-snapshot-warnings, which would wait ~2 minutes for snapshots that
# never arrive on pure code PRs.
#
# Source: https://github.com/actions/dependency-review-action
# Docs: https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review

name: 'Dependency review'
on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v7

      - name: 'Dependency Review'
        # v5 runs on Node 24 (avoids Node 20 deprecation warnings)
        uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: always
          # Do NOT enable retry-on-snapshot-warnings: we do not run a
          # dependency-submission job on PR heads, so retries only wait ~2min
          # for snapshots that never arrive ("No snapshots were found for the head SHA").
          retry-on-snapshot-warnings: false
