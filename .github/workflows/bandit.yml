# Bandit security linter for Python (app code only; tests excluded for B101 noise).

name: Bandit
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '21 19 * * 2'

jobs:
  bandit:
    permissions:
      contents: read
      security-events: write
      actions: read

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Bandit Scan
        uses: shundor/python-bandit-scan@ab1d87dfccc5a0ffab88be3aaac6ffe35c10d6cd
        with:
          exit_zero: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Production app code only — pytest asserts (B101) are expected in tests
          path: backend/app
          excluded_paths: "*/tests/*,*/test_*,*/venv/*,*/.venv/*,*/node_modules/*"
